# Piẻxed OS - Simplified Auto Build
name: Build Piẻxed OS ISO

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
       
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap squashfs-tools xorriso grub-pc-bin grub-efi-amd64-bin mtools gdisk rsync curl wget
      
      - name: Create dirs
        run: |
          mkdir -p output workspace/{chroot,image,squashfs,efi}
      
      - name: Bootstrap Ubuntu
        run: |
          cd workspace
          sudo debootstrap --arch=amd64 --variant=minbase jammy chroot http://archive.ubuntu.com/ubuntu/
      
      - name: Configure base
        run: |
          echo "piexed-os" | sudo tee workspace/chroot/etc/hostname
          cat << 'EOF' | sudo tee workspace/chroot/etc/apt/sources.list
deb http://archive.ubuntu.com/ubuntu jammy main restricted universe multiverse
deb http://archive.ubuntu.com/ubuntu jammy-updates main restricted universe multiverse
EOF
      
      - name: Install core
        run: |
          sudo chroot workspace/chroot /bin/bash -c "
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends \
              ubuntu-desktop \
              linux-image-generic \
              systemd \
              network-manager \
              lightdm \
              xfce4 \
              xfce4-goodies \
              vim \
              sudo \
              openssh-server \
              curl \
              wget \
              git \
              gparted \
              htop \
              neofetch \
              firefox
          "
      
      - name: Setup user
        run: |
          sudo chroot workspace/chroot /bin/bash -c "
            useradd -m -s /bin/bash piexed
            echo 'piexed:piexed' | chpasswd
            echo 'piexed ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/piexed
          "
      
      - name: Configure LightDM
        run: |
          sudo mkdir -p workspace/chroot/etc/lightdm
          sudo cat > workspace/chroot/etc/lightdm/lightdm.conf << 'EOF'
[LightDM]
autologin-user=piexed
user-session=xfce
greeter-session=lightdm-gtk-greeter
EOF
      
      - name: Version info
        run: |
          sudo cat > workspace/chroot/etc/piexed-version << 'EOF'
PIEXED_VERSION="1.0.0"
PIEXED_CODENAME="Professional Edition"
EOF
      
      - name: Create tools
        run: |
          sudo cat > workspace/chroot/usr/local/bin/piexed-info << 'TOOL'
#!/bin/bash
echo "============================================"
echo "    Piẻxed OS - System Info"
echo "============================================"
cat /etc/piexed-version 2>/dev/null || echo "Version: 1.0.0"
echo "Kernel: $(uname -r)"
echo "Uptime: $(uptime -p)"
echo "Disk:  $(df -h / | tail -1 | awk '{print $3 "/" $2 " (" $5 ")"}')"
echo "Memory: $(free -h | awk '/^Mem/ {print $3 "/" $2}')"
echo "CPU: $(nproc) cores"
echo "============================================"
TOOL
          sudo chmod +x workspace/chroot/usr/local/bin/piexed-info
      
      - name: Create post-install script
        run: |
          sudo cat > workspace/chroot/usr/local/bin/piexed-install-all << 'SCRIPT'
#!/bin/bash
echo "Piẻxed OS - Installing all tools..."
export DEBIAN_FRONTEND=noninteractive

apt-get update

# Dev tools
apt-get install -y build-essential gcc g++ make cmake python3 python3-pip nodejs npm

# Pen testing
apt-get install -y nmap wireshark net-tools tcpdump hydra john hashcat

# Music production
apt-get install -y ardour audacity hydrogen

# More apps
apt-get install -y vlc gimp libreoffice

echo "Done! Run 'piexed-info' to verify."
SCRIPT
          sudo chmod +x workspace/chroot/usr/local/bin/piexed-install-all
      
      - name: Make SquashFS
        run: |
          cd workspace
          sudo rsync -a --delete --exclude='/proc' --exclude='/sys' --exclude='/dev' --exclude='/run' chroot/ image/
          sudo mksquashfs image squashfs/filesystem.squashfs -noappend -comp xz -b 1M
      
      - name: Create EFI
        run: |
          cd workspace
          sudo mkdir -p efi/boot
          sudo cp squashfs/filesystem.squashfs efi/boot/
      
      - name: Make ISO
        run: |
          cd workspace
          sudo xorriso -as mkisofs \
            -iso-level 3 \
            -full-iso9660-filenames \
            -volid "PIEXED_OS_1.0.0" \
            -appid "Piẻxed OS" \
            -publisher "Piẻxed OS" \
            -output "../output/piexed-os.iso" \
            .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: piexed-os-iso
          path: output/piexed-os.iso
          retention-days: 30
