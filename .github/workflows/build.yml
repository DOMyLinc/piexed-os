# Piẻxed OS - Build ISO
name: Build Piẻxed OS ISO

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.1)'
        required: false
        default: '1.0.1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Set version
        id: set_version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            VERSION="${VERSION:-1.0.0}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building Piẻxed OS version: $VERSION"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap squashfs-tools xorriso grub-pc-bin grub-efi-amd64-bin mtools rsync curl wget

      - name: Create directories
        run: |
          mkdir -p output workspace/{chroot,image,efi}

      - name: Bootstrap Ubuntu
        run: |
          cd workspace
          sudo debootstrap --arch=amd64 --variant=minbase jammy chroot http://archive.ubuntu.com/ubuntu/

      - name: Configure base system
        run: |
          echo "piexed-os" | sudo tee workspace/chroot/etc/hostname
          printf 'deb http://archive.ubuntu.com/ubuntu jammy main restricted universe multiverse\ndeb http://archive.ubuntu.com/ubuntu jammy-updates main restricted universe multiverse\n' | sudo tee workspace/chroot/etc/apt/sources.list

      - name: Install core packages
        run: |
          sudo chroot workspace/chroot /bin/bash -c "
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends \
              ubuntu-standard \
              linux-image-generic \
              systemd \
              network-manager \
              lightdm \
              xfce4 \
              xfce4-goodies \
              vim \
              sudo \
              openssh-server \
              curl \
              wget \
              git \
              gparted \
              htop \
              neofetch \
              firefox \
              systemd-sysv
          "

      - name: Create piexed user
        run: |
          sudo chroot workspace/chroot /bin/bash -c "
            useradd -m -s /bin/bash piexed
            echo 'piexed:piexed' | chpasswd
            echo 'piexed ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/piexed
          "

      - name: Configure LightDM
        run: |
          sudo mkdir -p workspace/chroot/etc/lightdm
          printf '[LightDM]\nautologin-user=piexed\nuser-session=xfce\ngreeter-session=lightdm-gtk-greeter\n' | sudo tee -a workspace/chroot/etc/lightdm/lightdm.conf

      - name: Create version file
        run: |
          VERSION="${{ steps.set_version.outputs.version }}"
          printf 'PIEXED_VERSION="%s"\nPIEXED_CODENAME="Professional Edition"\n' "$VERSION" | sudo tee workspace/chroot/etc/piexed-version

      - name: Create system tools
        run: |
          printf '#!/bin/bash\necho "============================================"\necho "    Piẻxed OS - System Info"\necho "============================================"\ncat /etc/piexed-version 2>/dev/null || echo "Version: 1.0.0"\necho "Kernel: $(uname -r)"\necho "============================================"\n' | sudo tee workspace/chroot/usr/local/bin/piexed-info
          sudo chmod +x workspace/chroot/usr/local/bin/piexed-info

      - name: Create SquashFS
        run: |
          cd workspace
          sudo rsync -a --delete --exclude='/proc/*' --exclude='/sys/*' --exclude='/dev/*' --exclude='/run/*' chroot/ image/
          sudo mksquashfs image squashfs/filesystem.squashfs -noappend -comp xz -b 1M

      - name: Create ISO
        run: |
          cd workspace
          sudo xorriso -as mkisofs \
            -iso-level 3 \
            -full-iso9660-filenames \
            -volid "PIEXED_OS_${{ steps.set_version.outputs.version }}" \
            -appid "Piẻxed OS" \
            -publisher "Piẻxed OS" \
            -output "${{ github.workspace }}/output/piexed-os.iso" \
            -boot-info-table \
            .

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: piexed-os-iso
          path: ${{ github.workspace }}/output/piexed-os.iso
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: ${{ github.workspace }}/output/piexed-os.iso
          name: Piẻxed OS v${{ steps.set_version.outputs.version }} ISO
          body: |
            Piẻxed OS Professional Edition ISO v${{ steps.set_version.outputs.version }}
            
            Download and install!
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
