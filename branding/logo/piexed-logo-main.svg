<?xml version="1.0" encoding="UTF-8"?>
<!-- Piexed OS - Professional Main Logo -->
<!-- White and Black Design for Professional Use -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Professional white gradient -->
    <linearGradient id="whiteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E0E0E0"/>
    </linearGradient>
    <!-- Premium black gradient -->
    <linearGradient id="blackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2A2A3A"/>
      <stop offset="100%" style="stop-color:#0A0A15"/>
    </linearGradient>
    <!-- Shadow effect -->
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <!-- Inner glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background - Dark professional -->
  <rect width="512" height="512" fill="#1A1A2E"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#333344" stroke-width="3"/>

  <!-- Main logo container -->
  <circle cx="256" cy="230" r="140" fill="url(#whiteGrad)" filter="url(#shadow)"/>

  <!-- Inner decorative ring -->
  <circle cx="256" cy="230" r="120" fill="none" stroke="#1A1A2E" stroke-width="2" opacity="0.15"/>

  <!-- PIEXED text -->
  <text x="256" y="205"
        font-family="Arial, Helvetica, sans-serif"
        font-size="52"
        font-weight="bold"
        fill="#1A1A2E"
        text-anchor="middle"
        letter-spacing="6">
    PIEXED
  </text>

  <!-- OS text -->
  <text x="256" y="255"
        font-family="Arial, Helvetica, sans-serif"
        font-size="34"
        font-weight="300"
        fill="#1A1A2E"
        text-anchor="middle"
        letter-spacing="4">
    OS
  </text>

  <!-- Accent line -->
  <rect x="166" y="290" width="180" height="4" rx="2" fill="#E63946"/>

  <!-- Professional badge -->
  <text x="256" y="330"
        font-family="Arial, Helvetica, sans-serif"
        font-size="16"
        fill="#888888"
        text-anchor="middle"
        letter-spacing="3">
    PROFESSIONAL EDITION
  </text>

  <!-- Version -->
  <text x="256" y="365"
        font-family="Arial, Helvetica, sans-serif"
        font-size="13"
        fill="#666666"
        text-anchor="middle">
    Version 1.0.0 | Ubuntu 22.04 LTS
  </text>

  <!-- Tagline -->
  <text x="256" y="400"
        font-family="Arial, Helvetica, sans-serif"
        font-size="12"
        fill="#555555"
        text-anchor="middle">
    Lightweight • Powerful • Professional
  </text>
</svg>