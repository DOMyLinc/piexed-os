# Piexed OS System Configuration

# Performance Settings
PIEXED_ENABLE_ZRAM=1
PIEXED_SWAPPINESS=10
PIEXED_CACHE_PRESSURE=60
PIEXED_PRELOAD=1
PIEXED_EARLYOOM=1

# Desktop Settings
PIEXED_DESKTOP_THEME=piexed-dark
PIEXED_DOCK_SIZE=64
PIEXED_DOCK_MAGNIFICATION=1
PIEXED_PANEL_POSITION=top
PIEXED_ANIMATIONS=1

# Boot Settings
PIEXED_BOOT_ANIMATION=1
PIEXED_BOOT_SOUND=0
PIEXED_SPLASH_SCREEN=1
PIEXED_BOOT_TIMEOUT=10

# Update Settings
PIEXED_AUTO_UPDATE=1
PIEXED_UPDATE_FREQUENCY=weekly

# Security Settings
PIEXED_FIREWALL_ENABLED=1
PIEXED_APPARMOR_ENABLED=1

# Memory Limits
PIEXED_MIN_FREE_KBYTES=32768
PIEXED_MIN_FREE_PAGES=8192

# Network Settings
PIEXED_NETWORK_MANAGER=1
PIEXED_WIFI_POWER_SAVE=0

# Display Settings
PIEXED_COMPOSITOR=picom
PIEXED_VSYNC=1
