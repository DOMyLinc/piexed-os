# Piẻxed OS Branding Configuration
# Professional branding settings for installer and system

[branding]
# Product Name
PRODUCT_NAME="Piẻxed OS"
PRODUCT_NAME_SHORT="Piẻxed"
VERSION="1.0.0"
CODENAME="Strawberry Fields"

# Installer Branding
INSTALLER_TITLE="Install Piẻxed OS"
INSTALLER_SUBTITLE="Professional Edition"
INSTALLER_COPYRIGHT="© 2024 Piẻxed OS Team"

# Logo settings
LOGO_ENABLED=1
LOGO_WIDTH=256
LOGO_HEIGHT=256
LOGO_ANIMATION=1

# Boot splash
SPLASH_THEME="piexed"
SPLASH_BACKGROUND="#1A1A2E"
SPLASH_FOREGROUND="#FFFFFF"
SPLASH_ACCENT="#E63946"

# GRUB theme
GRUB_THEME="piexed"
GRUB_BACKGROUND="#1A1A2E"
GRUB_FOREGROUND="#FFFFFF"
GRUB_HIGHLIGHT="#E63946"

# Desktop theme
DESKTOP_THEME="piexed-dark"
DESKTOP_ACCENT="#E63946"
DESKTOP_ICONS="Papirus-Dark"
DESKTOP_FONT="Ubuntu"

# Colors
COLOR_PRIMARY="#E63946"
COLOR_PRIMARY_DARK="#9D0208"
COLOR_PRIMARY_LIGHT="#FF758F"
COLOR_BACKGROUND="#1A1A2E"
COLOR_FOREGROUND="#FFFFFF"
COLOR_ACCENT="#2A9D8F"

# Professional mode settings
PROFESSIONAL_MODE=1
CLEAN_DESIGN=1
ANIMATIONS_ENABLED=1