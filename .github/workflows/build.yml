# Piẻxed OS - Build ISO
name: Build Piẻxed OS ISO

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap squashfs-tools xorriso grub-pc-bin grub-efi-amd64-bin mtools rsync curl wget

      - name: Create directories
        run: |
          mkdir -p output workspace/{chroot,image,efi}

      - name: Bootstrap Ubuntu
        run: |
          cd workspace
          sudo debootstrap --arch=amd64 --variant=minbase jammy chroot http://archive.ubuntu.com/ubuntu/

      - name: Configure base system
        run: |
          echo "piexed-os" | sudo tee workspace/chroot/etc/hostname
