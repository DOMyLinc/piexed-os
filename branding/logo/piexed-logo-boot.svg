<?xml version="1.0" encoding="UTF-8"?>
<!-- Piexed OS Boot/Splash Logo - Professional White & Black -->
<!-- Dell/macOS inspired design for boot screen -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- White gradient for premium look -->
    <linearGradient id="whiteGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4D4D4;stop-opacity:1" />
    </linearGradient>
    <!-- Dark gradient -->
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D2D3D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A2E;stop-opacity:1" />
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#1A1A2E"/>

  <!-- Main circle container -->
  <circle cx="256" cy="220" r="140" fill="url(#whiteGradient)" filter="url(#shadow)"/>

  <!-- PIEXED text -->
  <text x="256" y="195"
        font-family="Arial, Helvetica, sans-serif"
        font-size="52"
        font-weight="bold"
        fill="#1A1A2E"
        text-anchor="middle"
        letter-spacing="8">
    PIEXED
  </text>

  <!-- OS text -->
  <text x="256" y="245"
        font-family="Arial, Helvetica, sans-serif"
        font-size="36"
        font-weight="400"
        fill="#1A1A2E"
        text-anchor="middle"
        letter-spacing="4">
    OS
  </text>

  <!-- Accent line -->
  <rect x="166" y="280" width="180" height="4" rx="2" fill="#E63946"/>

  <!-- Loading dots animation frames (static representation) -->
  <g fill="#E63946">
    <circle cx="206" cy="320" r="8"/>
    <circle cx="256" cy="320" r="8"/>
    <circle cx="306" cy="320" r="8"/>
  </g>

  <!-- Version text -->
  <text x="256" y="370"
        font-family="Arial, Helvetica, sans-serif"
        font-size="18"
        fill="#666666"
        text-anchor="middle">
    Professional Edition v1.0.0
  </text>

  <!-- Tagline -->
  <text x="256" y="400"
        font-family="Arial, Helvetica, sans-serif"
        font-size="14"
        fill="#444444"
        text-anchor="middle">
    Built on Ubuntu LTS
  </text>
</svg>