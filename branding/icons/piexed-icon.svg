<?xml version="1.0" encoding="UTF-8"?>
<!-- Piẻxed OS Icon - Professional White & Black -->
<!-- Optimized for apps and system icons -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Premium white gradient -->
    <linearGradient id="whiteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#C8C8C8"/>
    </linearGradient>
    <!-- Dark gradient -->
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2A2A3A"/>
      <stop offset="100%" style="stop-color:#0A0A15"/>
    </linearGradient>
    <!-- Shadow -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#darkGrad)"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>

  <!-- Main circle container -->
  <circle cx="256" cy="235" r="130" fill="url(#whiteGrad)" filter="url(#shadow)"/>

  <!-- PIEXED text -->
  <text x="256" y="210"
        font-family="Arial, Helvetica, sans-serif"
        font-size="48"
        font-weight="bold"
        fill="#0A0A15"
        text-anchor="middle"
        letter-spacing="6">
    PIEXED
  </text>

  <!-- OS text -->
  <text x="256" y="255"
        font-family="Arial, Helvetica, sans-serif"
        font-size="32"
        font-weight="300"
        fill="#0A0A15"
        text-anchor="middle"
        letter-spacing="4">
    OS
  </text>

  <!-- Accent bar -->
  <rect x="176" y="285" width="160" height="3" rx="1.5" fill="#E63946"/>

  <!-- Professional line -->
  <text x="256" y="330"
        font-family="Arial, Helvetica, sans-serif"
        font-size="16"
        fill="#888888"
        text-anchor="middle"
        letter-spacing="2">
    PROFESSIONAL
  </text>

  <!-- Version tag -->
  <rect x="196" y="355" width="120" height="28" rx="4" fill="#E63946"/>
  <text x="256" y="374"
        font-family="Arial, Helvetica, sans-serif"
        font-size="13"
        font-weight="bold"
        fill="#FFFFFF"
        text-anchor="middle">
    v1.0.0
  </text>
</svg>