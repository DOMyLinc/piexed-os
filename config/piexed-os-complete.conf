# Piẻxed OS System Configuration
# Professional settings for production use

[System]
Name=Piẻxed OS
FullName=Piexed OS Professional Edition
Version=1.0.0
Codename=Strawberry Fields
Build=Professional
Architecture=amd64
Base=Ubuntu 22.04 LTS

[Hardware]
MinRAM=1GB
MinStorage=10GB
RecommendedRAM=2GB
RecommendedStorage=20GB
SupportedArch=x86_64,ARM64

[Boot]
Timeout=2
Theme=piexed
SplashEnabled=true
QuietBoot=true
FastBoot=true

[Desktop]
Environment=XFCE
Theme=piexed-dark
IconTheme=Papirus-Dark
CursorTheme=Adwaita
FontName=Ubuntu
FontSize=12
DPI=96
Compositor=picom
Animations=true
SmoothAnimations=true

[Performance]
ZRAM=true
ZRAMPercent=50
Swapiness=10
CachePressure=60
Preload=true
BootCache=true
EarlyOOM=false

[Network]
Manager=NetworkManager
AutoConnect=true
DNS=8.8.8.8,8.8.4.4

[Security]
Firewall=true
AppArmor=true
SELinux=false
Encryption=luks

[PackageManager]
Type=apt
AutoUpdate=false
SecurityUpdates=true

[Professional]
CleanUI=true
MacOSExperience=true
DellStyleBoot=true
ProfessionalLogo=true
BrandingEnabled=true